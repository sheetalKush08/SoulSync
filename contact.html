<!-- ================= CONTACT PAGE ================= -->
<!-- File: pages/contact.html -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | SoulSync Yoga</title>

  <style>

    body{
      font-family:Poppins,sans-serif;
      background:#f7f7f7;
      padding:80px 8%;
    }

    h1{
      text-align:center;
      margin-bottom:40px;
      color:#9d4d84;
      font-size:3rem;
    }

    form{
      max-width:600px;
      margin:auto;
      background:white;
      padding:40px;
      border-radius:20px;
      box-shadow:0 10px 25px rgba(0,0,0,0.08);
    }

    input,textarea{
      width:100%;
      padding:15px;
      margin-bottom:20px;
      border:1px solid #ccc;
      border-radius:10px;
      outline:none;
    }

    button{
      width:100%;
      padding:15px;
      border:none;
      background:#9d4d84;
      color:white;
      border-radius:30px;
      font-size:1rem;
      cursor:pointer;
    }

  </style>
</head>
<body>

<h1>Contact Us</h1>

<form>

  <input type="text" placeholder="Your Name">

  <input type="email" placeholder="Your Email">

  <textarea rows="6" placeholder="Your Message"></textarea>

  <button>Send Message</button>

</form>

</body>
</html>
